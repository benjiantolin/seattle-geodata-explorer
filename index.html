<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DM06D4GEQX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-DM06D4GEQX');
    </script>
    <meta charset="UTF-8" />
    <title>Seattle GeoData Explorer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050b16" />
    <meta name="description" content="Search Seattle public GIS data, load live ArcGIS layers, and inspect features in a map-first workspace." />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>

  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="viewDiv"></div>
      <div id="inspector"></div>
      <div id="splashOverlay" class="splash-overlay">
        <div class="splash-overlay__card">
          <div class="splash-overlay__header">
            <div class="splash-overlay__brand">
              <img class="splash-overlay__logo" src="/assets/brand/seattle-geodata-explorer-icon-master.png" alt="Seattle GeoData Explorer logo" width="72" height="72" />
              <div>
                <div class="splash-overlay__eyebrow">Seattle GeoData Explorer</div>
                <h1>Explore Seattle’s public GIS data in one map-first workspace.</h1>
              </div>
            </div>
            <button type="button" class="splash-overlay__close" aria-label="Close splash" title="Close splash"></button>
          </div>
          <div class="splash-overlay__body">
            <p>Search the catalog, add live layers, and inspect attributes without leaving the map.</p>
            <div class="splash-overlay__features" aria-label="App highlights">
              <span>Search the catalog</span>
              <span>Load live layers</span>
              <span>Inspect attributes</span>
              <span>Explore Seattle data</span>
            </div>
          </div>
          <div class="splash-overlay__footer">
            <button type="button" class="splash-overlay__learn">About this project</button>
            <button type="button" class="splash-overlay__enter">Start Exploring</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

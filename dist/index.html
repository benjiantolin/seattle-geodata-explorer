<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Seattle GeoData Explorer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" crossorigin src="/seattle-geodata-explorer/assets/index-DNsVYdXs.js"></script>
    <link rel="stylesheet" crossorigin href="/seattle-geodata-explorer/assets/index-DFfZNEMt.css">
  </head>

  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="viewDiv"></div>
      <div id="inspector"></div>
      <div id="splashOverlay" class="splash-overlay">
        <div class="splash-overlay__card">
          <div class="splash-overlay__header">
            <div>
              <div class="splash-overlay__eyebrow">Seattle GeoData Explorer</div>
              <h1>Seattle's open GIS catalog, ready to explore.</h1>
            </div>
            <button type="button" class="splash-overlay__close" aria-label="Close splash">×</button>
          </div>
          <div class="splash-overlay__body">
            <p>Search, filter, load, and inspect Seattle ArcGIS services from one fast map workspace.</p>
            <div class="splash-overlay__features" aria-label="App highlights">
              <span>Live map layers</span>
              <span>Metadata inspection</span>
              <span>Attribute tables</span>
            </div>
          </div>
          <div class="splash-overlay__footer">
            <button type="button" class="splash-overlay__enter">Enter app</button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
